services:
  - type: web
    name: churn-api
    runtime: python
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt && PYTHONPATH=src python scripts/run_training.py
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: src
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: churn-dashboard
    runtime: python
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt && PYTHONPATH=src python scripts/run_training.py
    startCommand: streamlit run app/dashboard/app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --browser.gatherUsageStats=false
    envVars:
      - key: PYTHONPATH
        value: src
      - key: PYTHON_VERSION
        value: 3.11.0
